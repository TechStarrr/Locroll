                                                <div key={i} className={`w-full bg-[#13f09c] rounded-t-sm`} style={{ height: `${h}%` }}></div>
                                            ))}
                                        </div>
                                        <span className="material-symbols-outlined text-on-surface-variant/20 text-5xl mb-4">bar_chart</span>
                                        <div className="font-['IBM_Plex_Mono'] text-[10px] text-on-surface-variant uppercase tracking-widest">Awaiting transaction data</div>
                                        <p className="text-on-surface-variant/40 text-[9px] mt-2 max-w-[200px] text-center">
                                            Activity visualization will update automatically as funds move through your ecosystem.
                                        </p>
                                    </div>
                                    <div className="bg-surface-container-low rounded-xl p-6 border border-outline-variant/5">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-primary-container/5 rounded-full flex items-center justify-center">
                                                <span className="material-symbols-outlined text-[#13f09c]">verified</span>
                                            </div>
                                            <div>
                                                <div className="text-[10px] font-['IBM_Plex_Mono'] text-on-surface-variant uppercase">Compliance Status</div>
                                                <div className="text-sm font-bold text-on-surface">Ready for Onboarding</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="px-10 py-12 border-t border-outline-variant/5 mt-12 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-6">
                                <span className="font-['IBM_Plex_Mono'] text-[10px] text-on-surface-variant tracking-widest uppercase">© 2024 REMLO TECHNOLOGIES</span>
                                <div className="flex gap-4">
                                    <a className="text-[10px] font-['IBM_Plex_Mono'] text-on-surface-variant uppercase hover:text-[#13f09c] transition-colors" href="#">Privacy</a>
                                    <a className="text-[10px] font-['IBM_Plex_Mono'] text-on-surface-variant uppercase hover:text-[#13f09c] transition-colors" href="#">Terms</a>
                                    <a className="text-[10px] font-['IBM_Plex_Mono'] text-on-surface-variant uppercase hover:text-[#13f09c] transition-colors" href="#">Support</a>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex gap-1">
                                    {[1, 2, 3].map(i => <div key={i} className="w-1.5 h-1.5 rounded-full bg-[#13f09c]"></div>)}
                                </div>
                                <span className="font-['IBM_Plex_Mono'] text-[10px] text-[#13f09c] tracking-widest uppercase">System Operational</span>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        };

        // --- Helper Components ---

        const NavItem = ({ icon, label }) => (
            <a className="flex items-center px-8 py-3 text-[#dce1fb]/50 hover:bg-[#13f09c]/5 hover:text-[#13f09c] transition-all duration-150 ease-in-out" href="#">
                <span className="material-symbols-outlined mr-4 text-lg">{icon}</span>
                <span>{label}</span>
            </a>
        );

        const SectionHeader = ({ title, hideAction }) => (
            <div className="flex items-center justify-between">
                <h2 className="font-['IBM_Plex_Mono'] text-sm font-bold uppercase tracking-widest text-[#13f09c] flex items-center gap-3">
                    <span className={`w-4 h-4 rounded-sm ${title.includes('Recent') ? 'bg-[#13f09c]' : 'bg-outline-variant'}`}></span>
                    {title}
                </h2>
                {!hideAction && <button className="text-on-surface-variant hover:text-on-surface text-[10px] font-['IBM_Plex_Mono'] uppercase tracking-widest">View All</button>}
            </div>
        );

        const StatCard = ({ title, value, unit, icon, status, pending, yieldText, italic }) => (
            <div className="bg-surface-container-low rounded-xl p-6 relative overflow-hidden group hover:bg-surface-container-high transition-colors">
                {yieldText && <div className="absolute top-0 right-0 w-32 h-32 bg-[#13f09c]/5 blur-[60px] rounded-full -translate-y-1/2 translate-x-1/2"></div>}
                <div className="flex justify-between items-start mb-6">
                    <span className="font-['IBM_Plex_Mono'] text-[10px] text-on-surface-variant tracking-widest uppercase">{title}</span>
                    <div className={`${icon === 'history' || icon === 'groups' ? 'bg-surface-container-highest' : 'bg-primary-container/10'} p-2 rounded-lg`}>
                        <span className={`material-symbols-outlined ${icon === 'history' || icon === 'groups' ? 'text-on-surface-variant' : 'text-[#13f09c]'}`}>{icon}</span>
                    </div>
                </div>
                <div className="flex items-baseline gap-2">
                    <span className={`text-4xl font-black text-on-surface tracking-tighter ${italic ? 'italic text-sm text-on-surface-variant font-mono' : ''}`}>
                        {value}
                    </span>
                    {unit && <span className="text-on-surface-variant font-['IBM_Plex_Mono'] text-xs">{unit}</span>}
                </div>
                {status && (
                    <div className="mt-4 flex items-center text-[10px] text-[#13f09c] font-bold">
                        <span className="material-symbols-outlined text-xs mr-1">check_circle</span>
                        <span>{status}</span>
                    </div>
                )}
                {pending && (
                    <div className="mt-4 flex items-center">
                        <div className="bg-surface-variant px-3 py-1 rounded-full text-[10px] font-['IBM_Plex_Mono'] text-on-surface-variant flex items-center">
                            <span className="w-1.5 h-1.5 bg-yellow-500 rounded-full mr-2 animate-pulse"></span>
                            PENDING_KYC
                        </div>
                    </div>
                )}
                {yieldText && (
                    <div className="mt-4 flex items-center text-xs font-bold">
                        <span className="text-[#13f09c]">{yieldText}</span>
                        <span className="mx-2 text-on-surface-variant">/</span>
                        <span className="text-on-surface-variant font-['IBM_Plex_Mono'] text-[10px]">REAL_TIME_ACCUAL</span>
                    </div>
                )}
                {icon === 'history' && (
                    <div className="mt-8 h-1 bg-surface-container-highest rounded-full overflow-hidden">
                        <div className="h-full bg-[#13f09c]/20 w-0"></div>
                    </div>
                )}
            </div>
        );

        // --- Main App Wrapper ---

        const App = () => {
            const location = useLocation();
            
            // Scroll to top on route change
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [location]);

            return (
                <Routes>
                    <Route path="/" element={<LandingPage />} />
                    <Route path="/dashboard" element={<DashboardPage />} />
                </Routes>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>
</html>
